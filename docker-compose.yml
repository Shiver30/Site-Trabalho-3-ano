version: '3.8'

services:
  db:
      image: mysql:8.0
      container_name:  "mysql_lab"
      restart: always
      volumes:
        - ./banco/banco.sql:/docker-entrypoint-initdb.d/banco.sql
      environment:
        - MYSQL_ROOT_PASSWORD: 123
        - MYSQL_DATABASE: banco
      ports:
        - 3307:3306
